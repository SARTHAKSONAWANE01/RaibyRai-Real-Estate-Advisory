<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Inquiry Received</title>
    <style>
        body {
            font-family: 'DM Sans', Arial, sans-serif;
            background-color: #faf9f6;
            color: #0f0f0d;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border: 1px solid #e2ddd6;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(15, 15, 13, 0.05);
        }
        .header {
            background-color: #0f0f0d;
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid #b89a5e;
        }
        .logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 22px;
            color: #faf9f6;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .logo span {
            color: #b89a5e;
        }
        .content {
            padding: 30px;
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 20px;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 20px;
            color: #0f0f0d;
            border-bottom: 1px solid #e2ddd6;
            padding-bottom: 10px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f5f2ed;
            font-size: 14px;
        }
        .data-table th {
            font-weight: 500;
            color: #8a8478;
            width: 35%;
        }
        .data-table td {
            color: #0f0f0d;
        }
        .message-box {
            background-color: #f5f2ed;
            padding: 15px;
            border-left: 3px solid #b89a5e;
            font-size: 14px;
            line-height: 1.6;
            color: #625d54;
            margin-top: 5px;
        }
        .footer {
            background-color: #f5f2ed;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #e2ddd6;
            font-size: 12px;
            color: #8a8478;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Rai <span>by</span> Rai</div>
        </div>
        <div class="content">
            <h1>New Lead / Inquiry Received</h1>
            <table class="data-table">
                <tr>
                    <th>Lead Name</th>
                    <td>{{name}}</td>
                </tr>
                <tr>
                    <th>Email Address</th>
                    <td><a href="mailto:{{email}}">{{email}}</a></td>
                </tr>
                <tr>
                    <th>Phone Number</th>
                    <td><a href="tel:{{phone}}">{{phone}}</a></td>
                </tr>
                <tr>
                    <th>Current Location</th>
                    <td>{{location}}</td>
                </tr>
                <tr>
                    <th>Selected Package</th>
                    <td><strong>{{package}}</strong></td>
                </tr>
                <tr>
                    <th>Budget Scale</th>
                    <td>{{budget}}</td>
                </tr>
            </table>
            
            <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #8a8478; margin-top: 15px;">
                Customer Message
            </div>
            <div class="message-box">
                {{message}}
            </div>
        </div>
        <div class="footer">
            <p>This is an automated system notification from Rai by Rai Advisory platform.</p>
        </div>
    </div>
</body>
</html>
